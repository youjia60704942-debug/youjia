<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤查詢系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=DM+Mono:wght@500&display=swap');
  :root {
    --bg:#f0f4ff; --surface:#fff; --surface2:#e8eeff; --border:#c5d0f0;
    --accent:#2952cc; --accent2:#1a3ba8; --green:#0d7a4e; --green-bg:#d4f4e6;
    --amber:#8a5200; --amber-bg:#fff0cc; --red:#c0180f; --red-bg:#fde8e7;
    --text:#0d1236; --muted:#5a6490; --shadow:0 2px 16px rgba(41,82,204,.10);
    --sans:'Noto Sans TC',sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:17px;line-height:1.6}

  /* 登入 */
  #login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(150deg,#e8eeff,#f5f0ff)}
  .login-box{background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:52px 44px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(41,82,204,.13)}
  .login-logo{display:flex;align-items:center;gap:16px;margin-bottom:36px}
  .login-mark{width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;flex-shrink:0}
  .login-title{font-size:22px;font-weight:800;color:var(--text)}
  .login-sub{font-size:14px;color:var(--muted);margin-top:3px}
  .client-badge{display:inline-flex;align-items:center;gap:8px;background:#e0e9ff;border:2px solid #b0c4ff;color:var(--accent2);padding:10px 20px;border-radius:50px;font-size:17px;font-weight:700;margin-bottom:32px}
  .field-label{display:block;font-size:15px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.03em}
  input[type=password]{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:18px 20px;color:var(--text);font-size:20px;font-family:var(--sans);outline:none;transition:border-color .2s}
  input[type=password]:focus{border-color:var(--accent);background:#fff}
  .btn-login{width:100%;margin-top:22px;padding:20px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:19px;font-weight:800;font-family:var(--sans);cursor:pointer;letter-spacing:.05em;transition:background .2s,transform .1s}
  .btn-login:hover{background:var(--accent2)}
  .btn-login:active{transform:scale(.98)}
  .login-err{margin-top:16px;padding:14px 18px;border-radius:12px;background:var(--red-bg);border:2px solid #f5a8a5;color:var(--red);font-size:16px;font-weight:600;display:none}

  /* 主畫面 */
  #dashboard{display:none}
  .topbar{background:var(--accent);padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(41,82,204,.25);position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar-mark{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff}
  .topbar-name{font-size:18px;font-weight:800;color:#fff}
  .topbar-client{background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);color:#fff;padding:4px 14px;border-radius:50px;font-size:15px;font-weight:700}
  .btn-logout{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);color:#fff;padding:8px 18px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .2s}
  .btn-logout:hover{background:rgba(255,255,255,.28)}

  .main{max-width:1000px;margin:0 auto;padding:32px 20px}

  .filter-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:28px 30px;margin-bottom:28px;box-shadow:var(--shadow)}
  .filter-title{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
  .filter-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
  .filter-group{display:flex;flex-direction:column;gap:8px}
  .filter-group label{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:.04em}
  .filter-group input,.filter-group select{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:13px 18px;color:var(--text);font-size:16px;font-family:var(--sans);outline:none;transition:border-color .2s;min-width:160px;font-weight:600}
  .filter-group input:focus,.filter-group select:focus{border-color:var(--accent);background:#fff}
  .btn-query{padding:13px 32px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;font-family:var(--sans);cursor:pointer;transition:background .2s;letter-spacing:.03em;white-space:nowrap}
  .btn-query:hover{background:var(--accent2)}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:26px 28px;box-shadow:var(--shadow)}
  .stat-label{font-size:15px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:12px}
  .stat-val{font-size:42px;font-weight:900;font-family:var(--mono);color:var(--accent);line-height:1}
  .stat-unit{font-size:18px;font-weight:700;color:var(--muted);margin-left:4px}

  .table-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}
  .table-header{padding:22px 28px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#f5f7ff}
  .table-header-title{font-size:17px;font-weight:800;color:var(--text)}
  .record-count{font-size:15px;font-weight:700;color:var(--muted);background:var(--surface2);padding:5px 14px;border-radius:50px;border:2px solid var(--border)}

  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;padding:16px 22px;font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--border);background:#f8f9ff}
  tbody tr{border-bottom:2px solid #eef0fa;transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#f0f4ff}
  tbody td{padding:18px 22px}

  .td-date{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
  .td-name{font-size:18px;font-weight:800;color:var(--text)}
  .td-time{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent2)}
  .td-hours{font-family:var(--mono);font-size:18px;font-weight:800;color:var(--text)}
  .td-shift{display:inline-flex;align-items:center;padding:6px 14px;border-radius:50px;font-size:14px;font-weight:800;letter-spacing:.03em}
  .shift-day{background:var(--amber-bg);color:var(--amber);border:2px solid #f5d88a}
  .shift-night{background:#ede8ff;color:#4a1db0;border:2px solid #c9b8f5}
  .td-ot{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--green)}
  .td-ot.none{color:#aab0cc;font-weight:600}

  .empty-state{padding:70px 20px;text-align:center}
  .empty-icon{font-size:48px;margin-bottom:16px}
  .empty-text{font-size:18px;color:var(--muted);font-weight:600}
  .loading-wrap{padding:60px;text-align:center}
  .spin{display:inline-block;width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:14px 26px;border-radius:14px;font-size:16px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
  #toast.show{opacity:1}

  @media(max-width:640px){
    .stats-row{grid-template-columns:1fr;gap:14px}
    .stat-val{font-size:36px}
    .filter-row{flex-direction:column}
    .filter-group input,.filter-group select{min-width:unset;width:100%}
    .btn-query{width:100%;padding:16px;font-size:18px}
    thead th:nth-child(5),tbody td:nth-child(5){display:none}
    .login-box{padding:36px 24px}
  }
</style>
</head>
<body>

<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-mark">優</div>
      <div><div class="login-title">出勤查詢系統</div><div class="login-sub">優佳人力資源</div></div>
    </div>
    <div class="client-badge" id="login-client-badge">📍 載入中…</div>
    <div>
      <label class="field-label">管理密碼</label>
      <input type="password" id="pw-input" placeholder="請輸入密碼"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">登入查看出勤記錄</button>
    <div class="login-err" id="login-err">❌ 密碼錯誤，請重試</div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-mark">優</div>
      <div class="topbar-name">出勤查詢</div>
      <div class="topbar-client" id="topbar-client"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  </div>
  <div class="main">
    <div class="filter-card">
      <div class="filter-title">📅 查詢條件</div>
      <div class="filter-row">
        <div class="filter-group"><label>開始日期</label><input type="date" id="f-start"></div>
        <div class="filter-group"><label>結束日期</label><input type="date" id="f-end"></div>
        <div class="filter-group">
          <label>班別</label>
          <select id="f-shift">
            <option value="">全部班別</option>
            <option value="日班">日班</option>
            <option value="夜班">夜班</option>
          </select>
        </div>
        <button class="btn-query" onclick="loadRecords()">🔍 查詢</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">👤 出勤人次</div><div><span class="stat-val" id="stat-count">—</span><span class="stat-unit">次</span></div></div>
      <div class="stat-card"><div class="stat-label">⏱ 正常工時合計</div><div><span class="stat-val" id="stat-hours">—</span><span class="stat-unit">小時</span></div></div>
      <div class="stat-card"><div class="stat-label">⚡ 加班工時合計</div><div><span class="stat-val" id="stat-ot">—</span><span class="stat-unit">小時</span></div></div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-header-title">📋 打卡記錄</div>
        <div class="record-count" id="record-count">—</div>
      </div>
      <div id="table-body">
        <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">請選擇日期範圍後點擊查詢</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxXs2mDh1cZYy64cFJ87VGqiTl49wbTlPudoevmojhudp0diUZhffLrRWfkC8ZzRGef/exec';
let clientName='',verified=false;

window.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search);
  clientName=p.get('client')||'';
  if(!clientName){document.getElementById('login-client-badge').textContent='⚠ 缺少客戶參數';return;}
  document.getElementById('login-client-badge').textContent='📍 '+clientName;
  const today=new Date(),first=new Date(today.getFullYear(),today.getMonth(),1);
  document.getElementById('f-start').value=fmtDate(first);
  document.getElementById('f-end').value=fmtDate(today);
});

async function doLogin(){
  const pw=document.getElementById('pw-input').value;
  if(!pw){showErr('請輸入密碼');return;}
  const btn=document.querySelector('.btn-login');
  btn.textContent='驗證中…';btn.disabled=true;
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?action=client_login&client=${encodeURIComponent(clientName)}&pw=${encodeURIComponent(pw)}`);
    const data=await res.json();
    if(data.success){
      verified=true;
      document.getElementById('login-wrap').style.display='none';
      document.getElementById('dashboard').style.display='block';
      document.getElementById('topbar-client').textContent=clientName;
      loadRecords();
    }else{showErr('密碼錯誤，請重試');}
  }catch(e){showErr('連線失敗，請稍後再試');}
  btn.textContent='登入查看出勤記錄';btn.disabled=false;
}
function showErr(msg){const el=document.getElementById('login-err');el.textContent='❌ '+msg;el.style.display='block';}
function doLogout(){verified=false;document.getElementById('login-wrap').style.display='flex';document.getElementById('dashboard').style.display='none';document.getElementById('pw-input').value='';document.getElementById('login-err').style.display='none';}

async function loadRecords(){
  if(!verified)return;
  const start=document.getElementById('f-start').value,end=document.getElementById('f-end').value,shift=document.getElementById('f-shift').value;
  if(!start||!end){showToast('請選擇日期範圍');return;}
  if(start>end){showToast('開始日期不能晚於結束日期');return;}
  document.getElementById('table-body').innerHTML='<div class="loading-wrap"><div class="spin"></div></div>';
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?action=client_records&client=${encodeURIComponent(clientName)}&start=${start}&end=${end}&shift=${encodeURIComponent(shift)}`);
    const data=await res.json();
    if(!data.success){showToast('查詢失敗：'+(data.error||''));return;}
    renderTable(data.records||[]);
  }catch(e){
    showToast('連線失敗');
    document.getElementById('table-body').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">連線失敗，請稍後再試</div></div>';
  }
}

function renderTable(records){
  const tn=records.reduce((s,r)=>s+(parseFloat(r.normalHours)||0),0);
  const to=records.reduce((s,r)=>s+(parseFloat(r.overtimeHours)||0),0);
  document.getElementById('stat-count').textContent=records.length;
  document.getElementById('stat-hours').textContent=tn.toFixed(1);
  document.getElementById('stat-ot').textContent=to.toFixed(1);
  document.getElementById('record-count').textContent='共 '+records.length+' 筆';
  if(!records.length){
    document.getElementById('table-body').innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">此區間沒有出勤記錄</div></div>';
    return;
  }
  let html='<table><thead><tr><th>日期</th><th>姓名</th><th>班別</th><th>上班</th><th>下班</th><th>正常工時</th><th>加班工時</th></tr></thead><tbody>';
  records.forEach(r=>{
    const sc=r.shift==='日班'?'shift-day':'shift-night';
    const times=(r.note||'').match(/(\d{2}:\d{2})-(\d{2}:\d{2})/);
    const ci=times?times[1]:'—',co=times?times[2]:'—';
    const ot=parseFloat(r.overtimeHours)||0;
    html+=`<tr>
      <td class="td-date">${r.date||'—'}</td>
      <td class="td-name">${r.name||'—'}</td>
      <td><span class="td-shift ${sc}">${r.shift||'—'}</span></td>
      <td class="td-time">${ci}</td><td class="td-time">${co}</td>
      <td class="td-hours">${parseFloat(r.normalHours).toFixed(1)} 小時</td>
      <td class="td-ot ${ot>0?'':'none'}">${ot>0?ot.toFixed(1)+' 小時':'—'}</td>
    </tr>`;
  });
  document.getElementById('table-body').innerHTML=html+'</tbody></table>';
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
let _tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}
</script>
</body>
</html>
